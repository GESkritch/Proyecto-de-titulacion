<!DOCTYPE html>
<!--
    public/timeout.html
    Página de sesión expirada
    
    Propósito: Mostrada cuando el temporizador de página (15 min) expira sin actividad.
    - Previene que usuarios abandonen la página abierta indefinidamente.
    - Redirige a index.html para reiniciar el proceso.
    
    Implementación: Llamada por form.js cuando page-timer alcanza 0.
-->
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Tiempo agotado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div style="max-width:600px;margin:80px auto;text-align:center;">
        <h1>Tiempo agotado</h1>
        <p>Pasó mucho tiempo en la página. Por seguridad su sesión fue finalizada.</p>
        <p><a href="index.html">Volver al inicio</a></p>
    </div>
</body>
</html>
