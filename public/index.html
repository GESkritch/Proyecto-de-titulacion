<!DOCTYPE html>
<!--
    public/index.html
    Página pública para agendamiento de citas - Municipalidad / Departamento Transporte
    
    Propósito: Interfaz de usuario final para seleccionar trámite, fecha, hora y confirmar cita.
    
    Estructura:
    - Calendario interactivo (public/js/calendar.js): Mostrar disponibilidades por fecha
    - Selección de horarios (public/js/calendar.js): Horas disponibles según ocupación
    - Formulario de datos (public/js/form.js): Validación de RUT, teléfono, correo
    - Modal de confirmación (public/js/ui.js): Confirmar cita con temporizador
    
    Elementos clave:
    - #calendar: Contenedor del calendario
    - #tipoTramite: Selector de tipo de trámite (filtra disponibilidades)
    - #horasGrid: Grid de botones con horas disponibles
    - #formAgendamiento: Formulario principal
    - #modal-overlay: Modal de confirmación
    - #page-timer: Temporizador visible de sesión (15 min)
    
    Scripts importados:
    - form.js (ES6 module): Lógica principal del formulario
    - index_login.js: Modal de login para acceso admin
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendamiento Atención Vehicular</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
</head>

<body>

<h1>Agendamiento Atención Agencia Vehicular</h1>
<div id="page-timer" class="page-timer">Tiempo restante: 15:00</div>

<!-- BOTÓN INGRESO (ADMIN) -->
<div style="position:fixed; top:16px; right:20px; z-index:2000;">
    <button id="btnIngreso" style="padding:8px 12px; border-radius:6px; background:#2c7a4b; color:#fff; border:none; cursor:pointer;">Ingreso</button>
</div>

<form id="formAgendamiento">

<div class="form-container">

    <!-- CALENDARIO -->
    <fieldset>
        <legend>Tipo de Trámite</legend>
        
        <select id="tipoTramite" required>
            <option value="">Seleccione tipo de trámite</option>
            <option value="Renovación">Renovación</option>
            <option value="Licencia nueva">Licencia nueva</option>
        </select>
        
        <p class="info-tramite">
            Al seleccionar el trámite se mostrarán solo las fechas disponibles para este tramite.
        </p>

        <legend>Seleccione Fecha y Hora</legend>

        <div class="calendar-controls">
            <select id="monthSelect"></select>
            <select id="yearSelect"></select>
        </div>

        <div id="calendar"></div>

        <div class="legend">
            <span class="available box"></span> Disponible
            <span class="full box"></span> Sin cupos
            <span class="disabled box"></span> No laborable
        </div>

        <div class="horas-container" id="horasContainer">
            <label>Horarios disponibles:</label>
            <div class="horas-grid" id="horasGrid"></div>
            <small>Horario de atención: 09:00 a 17:00</small>
        </div>
    </fieldset>

    <!-- DATOS SOLICITANTE -->
    <fieldset id="datosSolicitante" class="disabled-fieldset">
        <legend>Datos del Solicitante</legend>
        
        <label>Nombres</label>
        <input type="text" id="nombres" required disabled>
        
        <label>Apellidos</label>
        <input type="text" id="apellidos" required disabled>
        
        <label>RUT</label>
        <input type="text" id="rut" required disabled>
        <small id="rutError" class="error"></small>
        
        <label>Teléfono</label>
        <input type="tel" id="telefono" required disabled>
        <small id="telefonoError" class="error"></small>
        
        <label>Correo electrónico</label>
        <input type="email" id="correo" required disabled>
        <small id="correoError" class="error"></small>
    </fieldset>


</div>

<button class="submit-btn" type="submit">Agendar Hora</button>

</form>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
        <h3 id="modal-title"></h3>
        <p id="modal-message"></p>
        <p id="modal-timer" class="modal-timer"></p>
        <div class="modal-actions">
            <button id="modal-cancel" class="btn-secondary">Cancelar</button>
            <button id="modal-confirm" class="btn-primary">Confirmar</button>
        </div>
    </div>
</div>

<script type="module" src="js/form.js"></script>
<script src="js/index_login.js"></script>

</body>
</html>
